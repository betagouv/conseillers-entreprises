cci_energie:
  title: Comment faire des économies d’énergie dans son entreprise ?
  subtitle: "J’accompagne les chefs d’entreprises à agir par ordre de priorité : d’abord <strong> la sobriété</strong>
             (enlever l'inutile), puis <strong>l’efficacité</strong> (agir pour réaliser des gains) et enfin
              <strong>les énergies renouvelables</strong> (s’autonomiser pour être pérenne). Ce cheminement permet de
              <strong>diminuer sa consommation d’énergie</strong>, un préalable pour mettre en place une énergie renouvelable
              dimensionnée au besoin réel de son entreprise"
  institution: cci
  expert: Priscille Julien
  publication_date: 2026-06-11
  initial_publication_date: 2024-10-01
  landing_subject: realiser-un-diagnostic-pour-reduire-votre-consommation-d-energie
