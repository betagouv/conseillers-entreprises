default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5

development:
  <<: *default
  database: place-des-entreprises-development
  host: localhost
  username: postgres
  password: postgres

test:
  <<: *default
  database: place-des-entreprises-test
  host: localhost
  username: postgres
  password: postgres

production:
  <<: *default
  url: <%= ENV.fetch('DATABASE_URL', 'place-des-entreprises-production') %>
